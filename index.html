<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PrecisionCut PRO | MDF Edition</title>
    <style>
        :root {
            --accent: #f39c12;
            --bg: #121212;
            --surface: #1e1e1e;
            --surface-card: #2a2a2a;
            --text: #e0e0e0;
            --border: #333;
            --success: #27ae60;
            --mdf-brown: #bc8f4f; /* Klassieke MDF kleur */
            --mdf-light: #d2b48c;
            --mdf-dark: #8b5a2b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; background: var(--bg); color: var(--text);
            line-height: 1.5; overflow-x: hidden;
        }

        header { 
            padding: 10px 15px; background: #000; 
            border-bottom: 2px solid var(--accent);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 4000;
        }
        .logo { font-weight: 900; color: var(--accent); font-size: 1rem; }
        
        #stats-container { display: flex; gap: 5px; }
        .stat-pill { background: #222; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; border: 1px solid var(--border); font-weight: bold; }
        .stat-done { color: var(--success); border-color: var(--success); }

        .main-wrapper { 
            display: grid; grid-template-columns: 1fr; gap: 20px; padding: 15px;
            max-width: 1600px; margin: 0 auto;
        }

        @media (min-width: 1100px) {
            .main-wrapper { grid-template-columns: 350px 1fr; }
            .sidebar { position: sticky; top: 70px; height: calc(100vh - 100px); overflow-y: auto; }
        }

        .panel { background: var(--surface); border-radius: 8px; border: 1px solid var(--border); padding: 15px; }
        h3 { margin: 0 0 15px; font-size: 0.75rem; text-transform: uppercase; color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .input-group label { display: block; font-size: 0.65rem; color: #bbb; margin-bottom: 3px; font-weight: 600; }
        input { background: #000; border: 1px solid #444; color: var(--accent); padding: 10px; border-radius: 4px; font-size: 1rem; width: 100%; font-weight: bold; }

        .piece-box { background: var(--surface-card); padding: 12px; border-radius: 6px; margin-bottom: 10px; border-left: 4px solid var(--accent); position: relative; }
        .btn { padding: 12px; border: none; border-radius: 4px; font-weight: 800; cursor: pointer; width: 100%; text-transform: uppercase; font-size: 0.8rem; }
        .btn-add { background: transparent; color: var(--success); border: 2px solid var(--success); margin-bottom: 10px; }
        .btn-calc { background: var(--accent); color: #000; }
        .btn-del { position: absolute; right: 5px; top: 5px; color: #e74c3c; background: none; border: none; font-weight: bold; cursor: pointer; }

        .plate-container { width: 100%; overflow-x: auto; margin-bottom: 15px; border-radius: 8px; }
        
        .plate-card { 
            background: #2a2a2a; border-radius: 8px; padding: 10px; color: #000; 
            margin-bottom: 20px; border: 1px solid #444; 
            cursor: zoom-in;
            transform-origin: top left;
            width: 100%;
            position: relative;
        }

        .plate-card.zoomed {
            width: 200%;
            z-index: 10;
            cursor: zoom-out;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        .plate-info { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 8px; border-bottom: 1px solid #555; padding-bottom: 5px; color: #fff; }
        .plate-num { font-size: 1.1rem; font-weight: 900; color: var(--accent); }
        .plate-dim { font-size: 0.8rem; font-weight: 600; opacity: 0.8; }

        canvas { width: 100%; height: auto; background: #333; display: block; border-radius: 2px; }
    </style>
</head>
<body>

<header>
    <div class="logo">PRECISIONCUT PRO <span style="font-weight:300; font-size: 0.7rem; color: #888;">MDF-MODE</span></div>
    <div id="stats-container">
        <div class="stat-pill" id="stat-total">0</div>
        <div class="stat-pill" id="stat-plates">0 P</div>
        <div class="stat-pill stat-done" id="stat-done">0 OK</div>
    </div>
</header>

<div class="main-wrapper">
    <div class="sidebar">
        <div class="panel">
            <h3>Plaat (MDF)</h3>
            <div class="input-row">
                <div class="input-group"><label>L (mm)</label><input type="number" id="sW" value="2500" oninput="saveAndRun()"></div>
                <div class="input-group"><label>B (mm)</label><input type="number" id="sH" value="1220" oninput="saveAndRun()"></div>
            </div>
            <div class="input-group" style="margin-bottom: 15px;">
                <label>ZAAGSNEDE (mm)</label>
                <input type="number" id="kerf" value="3.2" step="0.1" oninput="saveAndRun()">
            </div>
            <h3>Onderdelen</h3>
            <div id="piece-list"></div>
            <button class="btn btn-add" onclick="addPiece(); saveAndRun();">+ STUK TOEVOEGEN</button>
            <button class="btn btn-calc" onclick="runEngine()">🚀 BEREKEN PLAN</button>
            <button class="btn" style="background:none; color:#666; font-size:0.6rem; margin-top:10px;" onclick="resetDoneState()">RESET VINKJES</button>
        </div>
    </div>
    <div id="output-view"></div>
</div>

<script>
    let currentPlates = [];
    let zoomedId = null;
    let doneRegistry = new Set();

    function saveAndRun() { saveToStorage(); runEngine(); }

    function resetDoneState() {
        if(confirm("Alle vinkjes verwijderen?")) {
            doneRegistry.clear(); saveToStorage(); runEngine();
        }
    }

    function saveToStorage() {
        const data = {
            sW: document.getElementById('sW').value,
            sH: document.getElementById('sH').value,
            kerf: document.getElementById('kerf').value,
            pieces: [],
            doneItems: Array.from(doneRegistry)
        };
        document.querySelectorAll('.piece-box').forEach(box => {
            data.pieces.push({ w: box.querySelector('.pW').value, h: box.querySelector('.pH').value, qty: box.querySelector('.pQty').value });
        });
        localStorage.setItem('precisionCut_MDF', JSON.stringify(data));
    }

    function loadFromStorage() {
        const saved = localStorage.getItem('precisionCut_MDF');
        if (!saved) { addPiece(1500, 1000, 1); return; }
        const data = JSON.parse(saved);
        document.getElementById('sW').value = data.sW;
        document.getElementById('sH').value = data.sH;
        document.getElementById('kerf').value = data.kerf;
        if(data.doneItems) doneRegistry = new Set(data.doneItems);
        data.pieces.forEach(p => addPiece(p.w, p.h, p.qty));
        runEngine();
    }

    function addPiece(w = '', h = '', qty = 1) {
        const div = document.createElement('div');
        div.className = 'piece-box';
        div.innerHTML = `
            <button class="btn-del" onclick="this.parentElement.remove(); saveAndRun();">×</button>
            <div class="input-row">
                <div class="input-group"><label>LENGTE</label><input type="number" class="pW" value="${w}" oninput="saveAndRun()"></div>
                <div class="input-group"><label>BREEDTE</label><input type="number" class="pH" value="${h}" oninput="saveAndRun()"></div>
            </div>
            <div class="input-group"><label>AANTAL</label><input type="number" class="pQty" value="${qty}" oninput="saveAndRun()"></div>
        `;
        document.getElementById('piece-list').appendChild(div);
    }

    function runEngine() {
        const sW = parseInt(document.getElementById('sW').value) || 1;
        const sH = parseInt(document.getElementById('sH').value) || 1;
        const kerf = parseFloat(document.getElementById('kerf').value) || 0;
        
        let pool = [];
        document.querySelectorAll('.piece-box').forEach(box => {
            let w = parseInt(box.querySelector('.pW').value) || 0;
            let h = parseInt(box.querySelector('.pH').value) || 0;
            const qty = parseInt(box.querySelector('.pQty').value) || 0;
            if(w > 0 && h > 0) {
                for(let q=0; q<qty; q++) {
                    let rem = Math.max(w,h);
                    let staticD = Math.min(w,h);
                    while(rem > 0) {
                        let part = Math.min(rem, Math.max(sW, sH));
                        pool.push({w: part, h: staticD, area: part * staticD});
                        rem -= part;
                    }
                }
            }
        });

        pool.sort((a,b) => b.area - a.area);
        currentPlates = [];
        let items = [...pool];

        while(items.length > 0) {
            let plate = { w: sW, h: sH, parts: [], free: [{x:0, y:0, w:sW, h:sH}] };
            for(let i=0; i < items.length; i++) {
                let item = items[i];
                let bIdx = -1, orient = null;

                for(let j=0; j < plate.free.length; j++) {
                    let f = plate.free[j];
                    let opts = [{w: item.w, h: item.h}, {w: item.h, h: item.w}];
                    for(let o of opts) {
                        if(o.w <= f.w && o.h <= f.h) {
                            bIdx = j; orient = o; break;
                        }
                    }
                    if(bIdx !== -1) break;
                }

                if(bIdx !== -1) {
                    let f = plate.free[bIdx];
                    const id = `mdf-${currentPlates.length}-${f.x}-${f.y}-${orient.w}-${orient.h}`;
                    plate.parts.push({ id, x: f.x, y: f.y, w: orient.w, h: orient.h, done: doneRegistry.has(id) });
                    
                    let rw = f.w - orient.w, rh = f.h - orient.h;
                    plate.free.splice(bIdx, 1);
                    // Guillotine Split Logica
                    if (rw > rh) {
                        if (rw > kerf) plate.free.unshift({x: f.x + orient.w + kerf, y: f.y, w: rw - kerf, h: f.h});
                        if (rh > kerf) plate.free.unshift({x: f.x, y: f.y + orient.h + kerf, w: orient.w, h: rh - kerf});
                    } else {
                        if (rh > kerf) plate.free.unshift({x: f.x, y: f.y + orient.h + kerf, w: f.w, h: rh - kerf});
                        if (rw > kerf) plate.free.unshift({x: f.x + orient.w + kerf, y: f.y, w: rw - kerf, h: orient.h});
                    }
                    items.splice(i, 1); i--;
                }
            }
            currentPlates.push(plate);
            if(currentPlates.length > 50) break;
        }
        render();
    }

    function render() {
        const view = document.getElementById('output-view');
        view.innerHTML = '';
        
        currentPlates.forEach((plate, idx) => {
            const container = document.createElement('div');
            container.className = 'plate-container';
            const card = document.createElement('div');
            card.className = 'plate-card' + (zoomedId === idx ? ' zoomed' : '');
            card.innerHTML = `<div class="plate-info"><span class="plate-num">PLAAT ${idx+1}</span><span class="plate-dim">${plate.w}x${plate.h}mm</span></div>`;
            
            const canvas = document.createElement('canvas');
            canvas.width = plate.w; canvas.height = plate.h;
            const ctx = canvas.getContext('2d');

            // Achtergrond MDF
            ctx.fillStyle = "#4a3b2b"; // Donkere zaagsnede kleur
            ctx.fillRect(0,0,plate.w, plate.h);

            plate.parts.forEach(p => {
                // Deel kleur
                ctx.fillStyle = p.done ? "#1e4d2b" : "#bc8f4f"; 
                ctx.fillRect(p.x, p.y, p.w, p.h);
                
                // Rand
                ctx.strokeStyle = p.done ? "#27ae60" : "#8b5a2b";
                ctx.lineWidth = Math.max(6, plate.w / 350);
                ctx.strokeRect(p.x, p.y, p.w, p.h);
                
                // Maten
                ctx.fillStyle = p.done ? "#27ae60" : "#ffffff";
                ctx.shadowColor = "rgba(0,0,0,0.5)";
                ctx.shadowBlur = 4;
                let fontSize = Math.max(45, Math.min(p.w/5, p.h/3));
                ctx.font = `bold ${fontSize}px sans-serif`;
                ctx.textAlign = "center";
                ctx.fillText(`${p.w}x${p.h}`, p.x + p.w/2, p.y + p.h/2 + fontSize/3);
                ctx.shadowBlur = 0;
            });

            card.onclick = (e) => {
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX - rect.left) * (plate.w / rect.width);
                const y = (e.clientY - rect.top) * (plate.h / rect.height);
                let hit = false;
                plate.parts.forEach(p => {
                    if(x >= p.x && x <= p.x + p.w && y >= p.y && y <= p.y + p.h) {
                        p.done = !p.done;
                        if(p.done) doneRegistry.add(p.id); else doneRegistry.delete(p.id);
                        hit = true; saveToStorage();
                    }
                });
                if(!hit) zoomedId = (zoomedId === idx) ? null : idx;
                render();
            };

            card.appendChild(canvas);
            container.appendChild(card);
            view.appendChild(container);
        });

        let t = 0, d = 0;
        currentPlates.forEach(p => { t += p.parts.length; d += p.parts.filter(x => x.done).length; });
        document.getElementById('stat-total').innerText = t;
        document.getElementById('stat-plates').innerText = currentPlates.length + ' P';
        document.getElementById('stat-done').innerText = d + ' OK';
    }

    window.onload = loadFromStorage;
</script>

</body>
</html>
